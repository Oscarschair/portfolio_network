services:
  app:
    build: .
    ports:
      - '8080:80'
    volumes:
      - '.:/var/www/html'
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

  mysql:
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel_db
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - mysql
    ports:
      - '8081:80'
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password

volumes:
  mysql_data:
